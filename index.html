<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Video edit của tui</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#020617;
    color:#fff;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:#020617;
    position:sticky;
    top:0;
    z-index:10;
}

.logo{
    font-size:22px;
    font-weight:bold;
    color:#22c55e;
}

/* HERO */
.hero{
    height:70vh;
    background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba') center/cover;
    display:flex;
    align-items:flex-end;
    padding:40px;
}

.hero h1{
    font-size:50px;
    background:rgba(0,0,0,0.6);
    padding:15px 25px;
    border-radius:10px;
}

/* SECTION */
.container{
    padding:30px;
}

.section-title{
    font-size:22px;
    margin:20px 0 15px;
}

/* ROW */
.row{
    display:flex;
    gap:15px;
    overflow-x:auto;
    cursor:grab;
}
.row::-webkit-scrollbar{display:none;}

/* CATEGORY CARD */
.card{
    min-width:180px;
    height:180px;
    border-radius:12px;
    overflow:hidden;
    position:relative;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card:hover{
    transform:scale(1.08);
}

.card h3{
    position:absolute;
    bottom:10px;
    left:10px;
    font-size:14px;
    z-index:2;
}

.card::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:60%;
    background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* VIDEO CARD */
.video-card{
    min-width:220px;
    height:140px;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    flex-shrink:0;
}

.video-card video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.video-card:hover{
    transform:scale(1.08);
}

.video-card::after{
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:60%;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

.video-card p{
    position:absolute;
    bottom:8px;
    left:10px;
    font-size:13px;
}

/* PLAY BUTTON */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    background:rgba(0,0,0,0.6);
    border:none;
    color:white;
    font-size:20px;
    padding:10px 14px;
    border-radius:50%;
    cursor:pointer;
}

.play-btn:hover{
    background:#ef4444;
}

/* MODAL */
#videoModal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    z-index:999;
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">🎬 Video edit của tui</div>
</div>

<div class="hero">
    <h1>Thế giới video của bạn</h1>
</div>

<div class="container">

    <div class="section-title">🔥 Danh mục nổi bật</div>
    <div class="row" id="categories"></div>

    <div class="section-title">🆕 Video mới đăng</div>
    <div class="row" id="newVideos"></div>

</div>

<!-- MODAL -->
<div id="videoModal">
    <video id="modalVideo" controls style="max-width:80%; max-height:80%; border-radius:10px;"></video>
</div>

<script>
// LOAD CATEGORY
fetch("api.php")
.then(res => res.json())
.then(data => {
    let html = "";
    data.forEach(cat => {
        html += `
        <div class="card" onclick="location.href='category.php?id=${cat.id}'">
            <img src="${cat.thumbnail}">
            <h3>${cat.name}</h3>
        </div>`;
    });
    document.getElementById("categories").innerHTML = html;
});

// LOAD VIDEO
fetch("api_videos_new.php")
.then(res => res.json())
.then(data => {
    let html = "";
    data.forEach(v => {
        html += `
        <div class="video-card">
            <video src="${v.url}" muted></video>
            <p>${v.title}</p>
            <button class="play-btn" onclick="openVideo('${v.url}')">▶</button>
        </div>`;
    });
    document.getElementById("newVideos").innerHTML = html;

    initHover();
});

// HOVER PLAY
function initHover(){
    document.querySelectorAll(".video-card video").forEach(v => {
        v.addEventListener("mouseenter", () => v.play());
        v.addEventListener("mouseleave", () => {
            v.pause();
            v.currentTime = 0;
        });
    });
}

// MODAL
function openVideo(url){
    const modal = document.getElementById("videoModal");
    const video = document.getElementById("modalVideo");

    video.src = url;
    modal.style.display = "flex";
    video.play();
}

document.getElementById("videoModal").onclick = function(){
    this.style.display = "none";
    const v = document.getElementById("modalVideo");
    v.pause();
    v.src = "";
};

// DRAG SCROLL
const sliders = document.querySelectorAll(".row");

sliders.forEach(slider => {
    let isDown = false;
    let startX;
    let scrollLeft;

    slider.addEventListener('mousedown', e => {
        isDown = true;
        startX = e.pageX - slider.offsetLeft;
        scrollLeft = slider.scrollLeft;
    });

    slider.addEventListener('mouseleave', () => isDown = false);
    slider.addEventListener('mouseup', () => isDown = false);

    slider.addEventListener('mousemove', e => {
        if(!isDown) return;
        e.preventDefault();
        const x = e.pageX - slider.offsetLeft;
        const walk = (x - startX) * 2;
        slider.scrollLeft = scrollLeft - walk;
    });
});
</script>

</body>
</html>
